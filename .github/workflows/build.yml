name: Docker Build & Push

on:
  workflow_call:
    inputs:
      dockerfile-path:
        description: >
          Path to the Dockerfile inside the caller's repository.
          When omitted, the Dockerfile at the root of the repository is used.
          The workflow will fail if the specified file does not exist.
        type: string
        required: false
        default: "Dockerfile"

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Validate Dockerfile
        run: |
          if [ ! -f "${{ inputs.dockerfile-path }}" ]; then
            echo "::error::Dockerfile not found at '${{ inputs.dockerfile-path }}'. Ensure the file exists in the repository."
            exit 1
          fi

      - name: Extract version from pyproject.toml
        id: version
        run: |
          set -eo pipefail
          if [ ! -f "pyproject.toml" ]; then
            echo "::error::pyproject.toml not found at the root of the repository. A valid pyproject.toml with a version field is required."
            exit 1
          fi
          VERSION=$(grep -E "^version\s*=" pyproject.toml | head -1 | sed -E "s/.*=\s*['\"]([^'\"]+)['\"].*/\1/")
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract the version field from pyproject.toml. Ensure the file contains a valid version declaration (e.g. version = \"1.0.0\")."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set image metadata
        id: meta
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          VERSION="${{ steps.version.outputs.version }}"
          # GHCR requires image names to be lowercase
          IMAGE="ghcr.io/${OWNER,,}/${REPO,,}"
          TAG="${IMAGE}:${VERSION}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if tag already exists in GHCR
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if docker manifest inspect "$TAG" > /dev/null 2>&1; then
            echo "::error::Tag '$TAG' already exists in GHCR. Bump the version in pyproject.toml before pushing a new image."
            exit 1
          fi
          echo "Tag '$TAG' does not exist in GHCR. Proceeding with build and push."

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ steps.meta.outputs.tag }}
