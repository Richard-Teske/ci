# Ruff configuration file for linting and code formatting
# Reference: https://docs.astral.sh/ruff/configuration/

# Target Python version
target-version = "py311"

# Maximum line length
line-length = 120

# Directories and files to exclude from linting
exclude = [
    ".venv",
    "venv",
    "env",
    ".env",
    ".git",
    ".tox",
    "dist",
    "build",
    "__pycache__",
    "migrations",
    "node_modules",
]

[lint]
# Enable rule sets
# E/W: pycodestyle errors and warnings
# F: pyflakes
# I: isort
# B: flake8-bugbear
# C4: flake8-comprehensions
# UP: pyupgrade
# S: flake8-bandit (security)
# SIM: flake8-simplify
# ANN: flake8-annotations (type hints)
select = ["E", "W", "F", "I", "B", "C4", "UP", "SIM"]

# Rules to ignore
ignore = [
    "E501",   # Line too long (handled by line-length above)
    "B008",   # Do not perform function calls in default arguments
    "SIM108", # Ternary operator suggestions (can reduce readability)
]

# Allow automatic fixes for all enabled rules
fixable = ["ALL"]

# Rules that should never be auto-fixed
unfixable = []

[lint.isort]
# Group imports: standard library, third-party, local
known-first-party = ["app", "src"]
force-sort-within-sections = true

[lint.per-file-ignores]
# Ignore assert statements and security rules in test files
"tests/**/*.py" = ["S101", "S105", "S106"]
"test_*.py" = ["S101", "S105", "S106"]
"*_test.py" = ["S101", "S105", "S106"]

[format]
# Use double quotes for strings
quote-style = "double"

# Indent with spaces
indent-style = "space"

# Normalize line endings
line-ending = "auto"
